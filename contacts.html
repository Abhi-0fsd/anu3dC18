<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Information</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    text-align: center;
    background: #f2f2f2;
    padding-top: 80px; /* 🔥 for header space */
}

/* 🔥 NEW HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #f5f5dc;
  padding: 15px 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,.1);
  z-index: 2000;
}

.back-header {
  display: flex;
  align-items: center;
  gap: 15px;
}

.back-btn-header {
  text-decoration: none;
  color: black;
  font-size: 22px;
  display: flex;
  align-items: center;
}

.title-text {
  font-size: 22px;
  font-weight: bold;
  color: #ac1896;
}

/* ORIGINAL HEADER */
.header {
    width: 100%;
    padding: 25px 0;
    background: white;
    font-size: 32px;
    font-weight: bold;
    border-bottom: 4px solid #d100ff;
    border-top: 4px solid #ff008c;
}

h2 {
    margin-top: 35px;
    font-size: 22px;
    font-weight: bold;
}

/* CONTACT BOXES */
.contact-boxes {
    margin-top: 30px;
}

.row {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 35px;
}

.box {
    width: 130px;
    height: 130px;
    background: linear-gradient(135deg, #ff00aa, #6200ff);
    border-radius: 20px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: 0.3s;
    padding-top: 10px;
}

.box:hover {
    transform: scale(1.05);
}

.box img {
    width: 55px;
    height: 55px;
    margin-top: 10px;
}

.box p {
    margin-top: 10px;
    color: white;
    font-weight: bold;
    font-size: 16px;
}

/* BACK BUTTON */
.back-btn {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 18px;
    background: #007bff;
    color: white;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

.back-btn:hover {
    background: #005fcc;
    transform: scale(1.05);
}

/* FOOTER NAVBAR */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #f5f5dc;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
  z-index: 2000;
}

.bottom-nav a {
  text-decoration: none;
  color: #ac1896;
  font-size: 14px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.bottom-nav i {
  font-size: 22px;
  margin-bottom: 3px;
}
</style>
</head>

<body>

<!-- 🔥 NEW HEADER -->
<header>
  <div class="back-header">
    <a href="index.html" class="back-btn-header">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <!-- LOGO + TEXT -->
  <div style="display:flex; align-items:center; gap:10px;">
    
    <!-- IMAGE ICON -->
    <img src="https://i.postimg.cc/R05VcqPF/MAIN-LOGO.jpg" alt="Logo" style="width:40px; height:40px; object-fit:contain;">

    <span class="title-text">ANU 3D Printing</span>
  </div>
</header>

<div class="header">
    CONTACT INFORMATION
</div>

<h2>HI, HOW CAN I HELP YOU?</h2>

<div class="contact-boxes">

    <div class="row">
        <div class="box" onclick="window.location.href='tel:9444210661'">
            <img src="https://cdn-icons-png.flaticon.com/512/724/724664.png">
            <p>Call</p>
        </div>

        <div class="box" onclick="window.location.href='https://wa.me/9444210661'">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
            <p>WhatsApp</p>
        </div>
    </div>

    <div class="row">
        <div class="box" onclick="window.location.href='https://www.instagram.com/anu.3dprints/'">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
            <p>Instagram</p>
        </div>

        <div class="box" onclick="window.location.href='mailto:anu.3dprints@gmail.com'">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
            <p>Email</p>
        </div>
    </div>

</div>


<footer>
 <div class="bottom-nav">

      <i class="fa-solid fa-house"></i>
      Home
    </a>

     <a href="signup.html">

    </a>

    <a href="index.html">

      Search
    </a>

   <a href="cart.html">
      <i class="fa-solid fa-cart-shopping"></i>
      Cart
    </a>

    <a href="contacts.html">
      <i class="fa-solid fa-headset"></i>
      Help
    </a>

  </div>
</footer>

</body>
</html>
