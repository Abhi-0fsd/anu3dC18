<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  /* 🔥 PAGE WRAPPER */
.wrapper{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
body{
  margin:0;
  font-family:Arial;
  background:#eef6ff;
  padding-top:80px; /* 🔥 space for header */
  padding-bottom:70px; /* 🔥 space for footer */
}

/* 🔥 HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #f5f5dc;
  padding: 15px 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,.1);
  z-index: 2000;
}

.back-header {
  display: flex;
  align-items: center;
  gap: 15px;
}

.back-btn-header {
  text-decoration: none;
  color: black;
  font-size: 22px;
  display: flex;
  align-items: center;
}

.title-text {
  font-size: 22px;
  font-weight: bold;
  color: #ac1896;
}

/* CONTAINER */
.profile-container{
  max-width:900px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  text-align:center;
}

/* PROFILE IMAGE */
.profile-img{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #0099ff;
}

/* NAME */
.name{
  font-size:28px;
  font-weight:bold;
  margin-top:15px;
}

/* BUTTONS */
.btn{
  display:inline-block;
  padding:12px 20px;
  margin:10px;
  border-radius:8px;
  text-decoration:none;
  color:white;
}

.github{ background:#0077b5; }
.linkedin{ background:#0077b5; }

/* CONTACT */
.contact{
  margin-top:20px;
  font-size:15px;
}

/* 🔥 FOOTER */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #f5f5dc;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
  z-index: 2000;
}

.bottom-nav a {
  text-decoration: none;
  color: #ac1896;
  font-size: 14px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.bottom-nav i {
  font-size: 22px;
  margin-bottom: 3px;
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<header>

    <!-- IMAGE ICON -->
    <img src="https://i.postimg.cc/R05VcqPF/MAIN-LOGO.jpg" alt="Logo" style="width:40px; height:40px; object-fit:contain;">

    <span class="title-text">ANU 3D Printing</span>
  </div>
</header>

<div class="profile-container">
  

<img src="https://i.postimg.cc/RCHjdLPt/MAIN-LOGO.jpg" class="profile-img">

</div>

</a><br>
📩 anu.3dprints@gmail.com

</div>

</html>
